name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  style:
    name: Code style (Pint)
    runs-on: ubuntu-latest

    # Code style is a function of the Pint version and the source files only —
    # it does not depend on the illuminate/testbench versions. Running it once
    # on a fixed PHP with the resolved (highest) Pint keeps it deterministic and
    # avoids --prefer-lowest dragging Pint down to an ancient release whose
    # formatting rules differ from the one developers run locally.
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none

      - name: Install dependencies
        run: composer update --prefer-dist --no-interaction --no-progress

      - name: Check code style (Pint)
        run: vendor/bin/pint --test

  test:
    name: PHP ${{ matrix.php }} — Laravel ${{ matrix.laravel }} — ${{ matrix.dependency-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          # Highest resolvable dependencies
          - laravel: 12
            php: '8.2'
            testbench: '10.*'
            dependency-version: highest
          - laravel: 12
            php: '8.3'
            testbench: '10.*'
            dependency-version: highest
          - laravel: 13
            php: '8.3'
            testbench: '11.*'
            dependency-version: highest
          - laravel: 13
            php: '8.4'
            testbench: '11.*'
            dependency-version: highest
          # Lowest resolvable dependencies — exercises the real floors of
          # php ^8.2, illuminate/contracts ^12.0 and all dev dependencies.
          - laravel: 12
            php: '8.2'
            testbench: '10.*'
            dependency-version: lowest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip, pcntl, bcmath, intl
          coverage: none

      - name: Setup problem matchers
        run: |
          echo "::add-matcher::${{ runner.tool_cache }}/php.json"
          echo "::add-matcher::${{ runner.tool_cache }}/phpunit.json"

      - name: Install dependencies
        run: |
          composer require \
            "orchestra/testbench:${{ matrix.testbench }}" \
            --no-interaction --no-update
          composer update \
            ${{ matrix.dependency-version == 'lowest' && '--prefer-lowest --prefer-stable' || '' }} \
            --prefer-dist --no-interaction --no-progress

      - name: Run static analysis (PHPStan)
        run: vendor/bin/phpstan analyse --no-progress

      - name: Run tests (Pest)
        run: vendor/bin/pest

  test-mysql:
    name: PHP 8.3 — Laravel 13 — MySQL 8
    runs-on: ubuntu-latest

    # The default matrix runs on SQLite, which has no identifier-length limit and
    # so cannot catch issues like a too-long index name. This leg runs the real
    # migrations + full suite against MySQL 8 to exercise that surface.
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: notification_center_test
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      DB_CONNECTION: mysql
      DB_HOST: 127.0.0.1
      DB_PORT: '3306'
      DB_DATABASE: notification_center_test
      DB_USERNAME: root
      DB_PASSWORD: root

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: dom, curl, libxml, mbstring, zip, pcntl, bcmath, intl, pdo_mysql
          coverage: none

      - name: Install dependencies
        run: |
          composer require \
            "orchestra/testbench:11.*" \
            --no-interaction --no-update
          composer update --prefer-dist --no-interaction --no-progress

      - name: Run tests against MySQL (Pest)
        run: vendor/bin/pest

  test-mariadb:
    name: PHP 8.3 — Laravel 13 — MariaDB 11
    runs-on: ubuntu-latest

    services:
      mariadb:
        image: mariadb:11
        env:
          MARIADB_DATABASE: notification_center_test
          MARIADB_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        # MariaDB images ship their own healthcheck.sh; mysqladmin is unreliable here.
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      DB_CONNECTION: mariadb
      DB_HOST: 127.0.0.1
      DB_PORT: '3306'
      DB_DATABASE: notification_center_test
      DB_USERNAME: root
      DB_PASSWORD: root

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: dom, curl, libxml, mbstring, zip, pcntl, bcmath, intl, pdo_mysql
          coverage: none

      - name: Install dependencies
        run: |
          composer require \
            "orchestra/testbench:11.*" \
            --no-interaction --no-update
          composer update --prefer-dist --no-interaction --no-progress

      - name: Run tests against MariaDB (Pest)
        run: vendor/bin/pest

  test-postgres:
    name: PHP 8.3 — Laravel 13 — PostgreSQL 16
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: notification_center_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      DB_CONNECTION: pgsql
      DB_HOST: 127.0.0.1
      DB_PORT: '5432'
      DB_DATABASE: notification_center_test
      DB_USERNAME: postgres
      DB_PASSWORD: postgres

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: dom, curl, libxml, mbstring, zip, pcntl, bcmath, intl, pdo_pgsql
          coverage: none

      - name: Install dependencies
        run: |
          composer require \
            "orchestra/testbench:11.*" \
            --no-interaction --no-update
          composer update --prefer-dist --no-interaction --no-progress

      - name: Run tests against PostgreSQL (Pest)
        run: vendor/bin/pest
